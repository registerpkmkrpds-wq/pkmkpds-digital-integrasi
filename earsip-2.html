    function verifikasiPin() {
        const pinInput = document.getElementById('pinInput').value;
        if (btoa(pinInput) === PIN_HASH) {
            sessionStorage.setItem('is_authenticated', 'true');
            localStorage.setItem('pkm_session_status', 'AUTHORIZED');
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initApp();
        } else {
            alert("⚠️ PIN SALAH!");
            document.getElementById('pinInput').value = "";
        }
    }

    // Tambahkan listener untuk mendeteksi tombol Enter pada input PIN
document.getElementById('pinInput').addEventListener('keyup', function(event) {
    if (event.key === 'Enter') {
        event.preventDefault(); // Mencegah form reload jika ada
        verifikasiPin();
    }
});

    function initApp() {
    const kSel = document.getElementById('selKlaster');
    const fKlaster = document.getElementById('filterKlaster');
    
    const options = Object.keys(KLASTER).map(k => `<option value="${k}">${k}</option>`).join('');
    kSel.innerHTML = options;
    fKlaster.innerHTML = '<option value="">Semua Klaster</option>' + options;

    updateSub();
    syncFromGAS();

    // Jalankan jam digital yang sudah dipercantik
    updateClock(); 
    setInterval(updateClock, 1000);
}

function updateClock() {
    const now = new Date();
    
    // Format Jam: 08:30:05
    const timeStr = now.toLocaleTimeString('id-ID', { 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: false 
    });

    // Format Tanggal Singkat: Kamis, 09 Apr 2026
    const dateStr = now.toLocaleDateString('id-ID', { 
        weekday: 'short', 
        day: 'numeric', 
        month: 'short'
    });

    const clockEl = document.getElementById('clock');
    if (clockEl) {
        clockEl.innerHTML = `
            <div class="flex items-center gap-3">
                <span class="text-lg md:text-xl font-black text-emerald-600 drop-shadow-sm border-r border-slate-300 dark:border-slate-600 pr-3">
                    ${timeStr}
                </span>
                <span class="text-[9px] uppercase tracking-widest font-bold text-slate-500 leading-none">
                    ${dateStr}
                </span>
            </div>
        `;
    }
}

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('pageTitle').innerText = mode === 'arsip' ? 'Arsip Digital' : mode.toUpperCase();
        document.getElementById('arsipOnly').classList.toggle('hidden', mode !== 'arsip');
        document.getElementById('regOnly').classList.toggle('hidden', mode === 'arsip' || mode === 'agenda');
        resetForm();
        renderTable();
    }

    function updateSub() {
        const k = document.getElementById('selKlaster').value;
        document.getElementById('selSub').innerHTML = KLASTER[k].map(s => `<option value="${s}">${s}</option>`).join('');
        generatePreview();
    }

    // --- Perbaikan pada fungsi generatePreview ---
function generatePreview() {
    // Jika sedang edit, jangan ubah nomor yang sudah ada di database
    if (editIndex !== null && currentEditNo) {
        document.getElementById('displayNomor').innerText = currentEditNo;
        return currentEditNo;
    }

    const jenis = document.getElementById('selJenisSurat').value || "DOC";
    const s = document.getElementById('selSub').value;
    const kode = s ? s.split(' ')[0] : "000";
    
    // Pastikan noUrut adalah angka
    const noRaw = document.getElementById('noUrut').value || "0";
    const no = noRaw.padStart(3, '0');
    
    const tglVal = document.getElementById('arsipTgl').value;
    const d = tglVal ? new Date(tglVal) : new Date();
    const romawi = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"][d.getMonth()];
    const thn = d.getFullYear();

    let nomor = `${kode}/${no}/${jenis}/PKM-KPDS/${romawi}/${thn}`;
    
    // Logika khusus untuk surat masuk
    if(currentMode === 'masuk') {
        nomor = `REG-IN/${no}/PKM-KPDS/${romawi}/${thn}`;
    }

    document.getElementById('displayNomor').innerText = nomor;
    return nomor;
}
    document.getElementById('arsipFile').onchange = (e) => {
        const file = e.target.files[0];
        const label = document.getElementById('labelFile');
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
            alert("Maksimal 2MB!");
            e.target.value = "";
            return;
        }
        label.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
        const reader = new FileReader();
        reader.onload = (ev) => {
            fileData = { base64: ev.target.result.split(',')[1], name: file.name, type: file.type };
            label.innerHTML = `<i class="fas fa-check-circle text-emerald-500"></i> ${file.name}`;
        };
        reader.readAsDataURL(file);
    };

    // Pastikan bagian ini diubah di dalam <script> HTML Anda
document.getElementById('formArsip').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSimpan');
    const progContainer = document.getElementById('progressContainer');
    const progBar = document.getElementById('progressBar');
    const progText = document.getElementById('progressText');
    
    // Validasi Awal
    if (!document.getElementById('arsipNama').value) return alert("Perihal harus diisi!");

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
    
    // MUNCULKAN BAR PROSES
    progContainer.classList.remove('hidden');
    progBar.style.width = '0%';
    progText.innerText = "UPLOADING: 0%";

    const payload = {
        token: "2026", // PIN murni
        action: editIndex !== null ? "update" : "upload",
        mode: currentMode,
        no: generatePreview(),
        nama: document.getElementById('arsipNama').value.toUpperCase(),
        klaster: document.getElementById('selKlaster').value,
        sub: document.getElementById('selSub').value,
        jenisSurat: document.getElementById('selJenisSurat').value,
        tgl: document.getElementById('arsipTgl').value,
        asal: document.getElementById('inpAsal').value,
        tujuan: document.getElementById('inpTujuan').value,
        fileData: fileData ? fileData.base64 : null 
    };

    // LOGIKA ANIMASI BAR PROSES (Dibuat Manual karena Fetch tidak mendukung progress upload murni)
    let p = 0;
    const interval = setInterval(() => {
        if (p < 90) { // Berhenti di 90% sampai ada respon dari server
            p += (90 - p) * 0.1;
            progBar.style.width = p + '%';
            progText.innerText = `UPLOADING: ${Math.round(p)}%`;
        }
    }, 200);

    try {
        const resp = await fetch(GAS_URL, { 
            method: "POST", 
            body: JSON.stringify(payload) 
        });
        
        const res = await resp.json();

        if (res.status === "success") {
            clearInterval(interval); // Hentikan animasi
            progBar.style.width = '100%'; // Full-kan bar
            progText.innerText = "SELESAI!";
            
            setTimeout(() => {
                alert("✅ Berhasil Disimpan!");
                resetForm();
                syncFromGAS();
            }, 500);
        } else {
            throw new Error(res.msg);
        }
    } catch (err) {
        clearInterval(interval);
        alert("❌ Gagal: " + err.message);
        progContainer.classList.add('hidden');
    } finally {
        btn.disabled = false;
        btn.innerText = "SIMPAN & ARSIPKAN";
    }
};
	
    async function syncFromGAS() {
        const syncIcon = document.getElementById('syncIcon');
        syncIcon.classList.add('fa-spin');
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            database = data.database || [];
            localStorage.setItem('db_arsip_kpds', JSON.stringify(database));
            renderTable();
        } catch(e) { console.error(e); } 
        finally { syncIcon.classList.remove('fa-spin'); }
    }

   function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const fKlaster = document.getElementById('filterKlaster').value;
    const fJenis = document.getElementById('filterJenis').value;

    // 1. Filter Berlapis
    const filtered = database.filter(x => {
        const matchMode = (x.mode || 'arsip') === currentMode;
        const matchQ = x.no.toLowerCase().includes(q) || x.nama.toLowerCase().includes(q);
        const matchK = fKlaster === "" || x.klaster === fKlaster;
        const matchJ = fJenis === "" || x.jenis === fJenis;
        return matchMode && matchQ && matchK && matchJ;
    });
    
    // 2. Update Statistik Berdasarkan Filter Aktif (Ikon sudah ada di HTML)
    document.getElementById('statTotal').innerText = filtered.length;
    document.getElementById('statSK').innerText = filtered.filter(x => x.jenis === 'SK').length;
    document.getElementById('statSOP').innerText = filtered.filter(x => x.jenis === 'SOP').length;
    document.getElementById('statLain').innerText = filtered.filter(x => x.jenis !== 'SK' && x.jenis !== 'SOP').length;
    document.getElementById('statKlaster').innerText = [...new Set(filtered.map(x => x.klaster))].length;

    // 3. Render Baris Tabel
    document.getElementById('tableBody').innerHTML = filtered.map((x) => {
        // Logika Retensi Otomatis
        const retensiLabel = x.retensi || "✅ Aktif"; 
        let retColor = "bg-slate-100 text-slate-400";

        if (retensiLabel.includes("PERMANEN")) retColor = "bg-emerald-100 text-emerald-700";
        else if (/⚠️|INAKTIF|habis/i.test(retensiLabel)) retColor = "bg-rose-100 text-rose-700 animate-pulse";
        else if (/🕒|Hampir/i.test(retensiLabel)) retColor = "bg-amber-100 text-amber-700";

        // Mencari index asli untuk tombol Aksi
        const originalIndex = database.findIndex(item => item.no === x.no);

        return `
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 border-b dark:border-slate-800 transition-colors">
            <td class="p-4">
                <div class="flex items-center gap-2 mb-1">
                    <span class="font-mono text-emerald-600 font-black text-[10px]">${x.no}</span>
                    <span class="text-[7px] px-1.5 py-0.5 rounded font-bold ${retColor}">${retensiLabel}</span>
                </div>
                <div class="font-bold uppercase text-slate-700 dark:text-slate-200 leading-tight">${x.nama}</div>
                <div class="text-[9px] text-slate-400 font-bold uppercase mt-1">
                    <i class="far fa-folder mr-1"></i>${x.klaster} | <i class="far fa-calendar-alt mr-1"></i>${x.tgl}
                    ${x.asal && x.asal !== '-' ? ` | Dari: ${x.asal}` : ''}
                </div>
            </td>
            <td class="p-4 text-center hidden md:table-cell">
                <span class="px-2 py-1 rounded-full text-[11px] font-black bg-slate-100 dark:bg-slate-800">${x.jenis || 'DOC'}</span>
            </td>
            <td class="p-4">
                <div class="flex justify-center gap-2 whitespace-nowrap">
                    <button onclick="cetakBarcode(${originalIndex})" class="btn-action bg-slate-100 dark:bg-slate-700 hover:bg-emerald-500 hover:text-white" title="QR Code">
                        <i class="fas fa-qrcode"></i>
                    </button>
                    <button onclick="editData(${originalIndex})" class="btn-action bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white" title="Edit">
                        <i class="fas fa-pen text-[10px]"></i>
                    </button>
                    <button onclick="openPreview('${x.link}', '${x.nama}')" class="btn-action bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white" title="Lihat">
                        <i class="fas fa-eye text-[10px]"></i>
                    </button>
                    <button onclick="hapus('${x.no}')" class="btn-action bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white" title="Hapus">
                        <i class="fas fa-trash text-[10px]"></i>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');

    // Update Placeholder No Urut Terakhir
    const maxNo = database
        .filter(x => (x.mode || 'arsip') === currentMode)
        .map(x => {
            const p = x.no.split('/');
            return p.length > 1 ? parseInt(p[1], 10) : 0;
        })
        .reduce((a, b) => Math.max(a, b), 0);
    document.getElementById('noUrut').placeholder = "No Terakhir: " + maxNo;
}

/**
 * FUNGSI PREVIEW DENGAN PROTEKSI & WATERMARK
 */
function openPreview(link, namaDokumen = "") {
    if(!link || link === 'undefined' || link === '') return alert("File tidak ditemukan!");

    const namaUpper = namaDokumen.toUpperCase();

    // 1. Proteksi Dokumen Keuangan/Sensitif
    if (namaUpper.includes("KEUANGAN") || namaUpper.includes("GAJI") || namaUpper.includes("DANA")) {
        const pin = prompt("⚠️ DOKUMEN SENSITIF!\nMasukkan PIN Verifikasi untuk melihat:");
        if (btoa(pin) !== PIN_HASH) { // PIN_HASH adalah "MjAyNg=="
            alert("Akses Ditolak! PIN Salah.");
            return;
        }
    }

    // 2. Update Teks Watermark
    const wm = document.querySelector('.watermark-overlay');
    if (wm) {
        wm.innerText = namaUpper.includes("KEUANGAN") ? "RAHASIA NEGARA" : "PKM KIARAPEDES";
    }

    // 3. Tampilkan Dokumen
    const frame = document.getElementById('previewFrame');
    frame.src = link.replace('/view', '/preview');
    document.getElementById('modalPreview').classList.remove('hidden');
}
		
    function cetakBarcode(i) {
        const data = database[i];
        const win = window.open('', '_blank', 'width=400,height=500');
        win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>body{text-align:center;padding:20px;font-family:sans-serif}.box{border:3px solid #000;padding:20px;border-radius:15px;display:inline-block;width:250px}#qr{margin:20px auto;display:flex;justify-content:center}.no{font-weight:900;font-size:14px;border-bottom:2px solid #000;padding-bottom:10px}</style></head><body><div class="box"><div class="no">${data.no}</div><div id="qr"></div><div class="nama" style="font-size:10px;font-weight:bold;text-transform:uppercase">${data.nama}</div></div><script>new QRCode(document.getElementById("qr"),{text:"${data.link}",width:150,height:150});setTimeout(()=>window.print(),500)<\/script></body></html>`);
    }

    function editData(i) {
    editIndex = i;
    const d = database[i];
    currentEditNo = d.no; // Simpan nomor asli untuk referensi backend

    const parts = d.no.split('/');
    if (parts.length > 1) {
    const noUrutHanyaAngka = parseInt(parts[1], 10);
    document.getElementById('noUrut').value = noUrutHanyaAngka;
    }
    document.getElementById('selJenisSurat').value = d.jenis || "";
    document.getElementById('selKlaster').value = d.klaster;
    updateSub(); // Memastikan dropdown sub-klaster terisi
    document.getElementById('selSub').value = d.sub;
    document.getElementById('arsipNama').value = d.nama;
    document.getElementById('arsipTgl').value = d.tgl;
    document.getElementById('inpAsal').value = d.asal || "";
    document.getElementById('inpTujuan').value = d.tujuan || "";
    
    generatePreview();
    document.getElementById('btnSimpan').innerText = "UPDATE DATA";
    document.getElementById('btnBatal').classList.remove('hidden');
    window.scrollTo({top: 0, behavior: 'smooth'});
}
	
    async function hapus(no) {
        const pin = prompt(`Hapus data ${no}?\nPIN Konfirmasi:`);
        if (btoa(pin) === PIN_HASH) {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "delete", no: no, token: pin }) });
            syncFromGAS();
        } else if(pin) { alert("PIN SALAH!"); }
    }

    function resetForm() {
        editIndex = null; currentEditNo = null; fileData = null;
        document.getElementById('formArsip').reset();
        document.getElementById('btnSimpan').innerText = "SIMPAN & ARSIPKAN";
        document.getElementById('btnBatal').classList.add('hidden');
        document.getElementById('labelFile').innerText = "UPLOAD PDF (MAX 2MB)";
        document.getElementById('progressContainer').classList.add('hidden');
    }

    function exportToExcel() {
