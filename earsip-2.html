<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Arsip | PKM Kiarapedes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #1e293b; --sidebar-width: 280px; }
        .dark { --bg-body: #020617; --bg-card: #0f172a; --text-main: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        #sidebar { width: var(--sidebar-width); transition: 0.3s; z-index: 50; }
        #sidebar.closed { transform: translateX(-100%); margin-left: calc(var(--sidebar-width) * -1); }
        .card-custom { background: var(--bg-card); border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .dark .card-custom { border-color: #1e293b; }
        
        .nav-btn { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; transition: 0.2s; color: #94a3b8; font-weight: 600; text-align: left; }
        .nav-btn.active { background: #10b981; color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        .input-modern { width: 100%; padding: 0.75rem 1rem; background: rgba(0,0,0,0.05); border: 2px solid transparent; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem; outline: none; color: inherit; }
        .dark .input-modern { background: rgba(255,255,255,0.05); }
        .input-modern:focus { border-color: #10b981; }

        .btn-action { width: 32px; height: 32px; border-radius: 8px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .kode-tag { display: inline-block; padding: 2px 8px; background: white; color: #475569; border-radius: 4px; font-family: monospace; font-size: 9px; font-weight: bold; margin: 2px; border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        @media (max-width: 1024px) { #sidebar { position: fixed; height: 100vh; } }
    </style>
</head>
<body class="min-h-screen flex text-sm">

<div id="modalLogin" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-[2.5rem] text-center max-w-xs w-full shadow-2xl border border-slate-700">
        <div class="w-16 h-16 bg-emerald-500/20 text-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl animate-bounce">
            <i class="fas fa-lock"></i>
        </div>
        <h2 class="font-black text-white uppercase mb-2">Verifikasi</h2>
        <input type="password" id="pinInput" class="input-modern text-center text-2xl mb-4 text-white tracking-widest" placeholder="****">
        <button onclick="verifikasiPin()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-emerald-500">MASUK</button>
    </div>
</div>

<aside id="sidebar" class="bg-slate-900 text-white flex flex-col shrink-0 overflow-hidden">
    <div class="p-6 border-b border-slate-800 flex items-center gap-4">
        <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-folder-open"></i></div>
        <div>
            <h1 class="text-xl font-black italic leading-none">E-<span class="text-emerald-500">ARSIP</span></h1>
            <p class="text-[8px] font-bold uppercase tracking-widest text-slate-500">PKM Kiarapedes</p>
        </div>
    </div>
    
    <div class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
    <p class="text-[10px] font-bold text-slate-500 uppercase px-4 py-2">Menu</p>
    
    <button onclick="switchMode('arsip')" id="btn-arsip" class="nav-btn active">
        <i class="fas fa-box-archive w-5"></i> Arsip Digital
    </button>
    
    <button onclick="switchMode('masuk')" id="btn-masuk" class="nav-btn">
        <i class="fas fa-file-import w-5" style="font-size:20px; color:green"></i> Surat Masuk
    </button>
    
    <button onclick="switchMode('keluar')" id="btn-keluar" class="nav-btn">
        <i class="fas fa-file-export w-5" style="font-size:20px; color:red"></i> Surat Keluar
    </button>
    
    <button onclick="switchMode('agenda')" id="btn-agenda" class="nav-btn">
        <i class="fas fa-book w-5" style="font-size:20px; color:DodgerBlue"></i> Buku Agenda
    </button>

    <a href="https://forms.gle/8YaZuRzAaA7s1mHP9" target="_blank" class="nav-btn">
        <i class="fas fa-edit w-5" style="font-size:20px; color:yellow"></i> Buat Surat Tugas
    </a>
        
        <div class="pt-4 mt-4 border-t border-slate-800">
            <button onclick="togglePedoman()" class="nav-btn"><i class="fas fa-book-open w-5" style="font-size:20px; color:LawnGreen"></i> Pedoman Kode</button>
            <button onclick="syncFromGAS()" class="nav-btn"><i class="fas fa-sync w-5" id="syncIcon" style="font-size:20px; color:OrangeRed"></i> Sinkronisasi</button>
            <button onclick="exportToExcel()" class="nav-btn"><i class="fas fa-file-excel w-5" style="font-size:20px; color:MediumSeaGreen"></i> Export Excel</button>
            <button onclick="toggleTheme()" class="nav-btn"><i class="fas fa-moon w-5" id="themeIcon" style="font-size:20px; color:white"></i> Ganti Tema</button>
            <button onclick="logout()" class="nav-btn"><i class="fas fa-power-off w-5" style="font-size:20px; color:maroon"></i> Keluar</button>
        </div>
    </div>
</aside>

<div id="mainContent" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
    <header class="h-16 bg-white dark:bg-slate-900 border-b flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('sidebar').classList.toggle('closed')" class="w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800"><i class="fas fa-bars"></i></button>
            <h2 id="pageTitle" class="font-black uppercase tracking-widest text-xs text-emerald-600">Arsip Digital</h2>
        </div>
        <div id="clock" class="text-[10px] font-mono font-bold bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-lg">--:--:--</div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
        <div id="statsContainer" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="card-custom p-5 border-l-4 border-emerald-500">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Arsip</p>
                <h3 id="statTotal" class="text-2xl font-black">0</h3>
            </div>
            <div class="card-custom p-5 border-l-4 border-blue-500">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total SK</p>
                <h3 id="statSK" class="text-2xl font-black">0</h3>
            </div>
            <div class="card-custom p-5 border-l-4 border-purple-500">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total SOP</p>
                <h3 id="statSOP" class="text-2xl font-black">0</h3>
            </div>
            <div class="card-custom p-5 border-l-4 border-rose-500">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Dok. Lain</p>
                <h3 id="statLain" class="text-2xl font-black">0</h3>
            </div>
            <div class="card-custom p-5 border-l-4 border-amber-500">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Klaster</p>
                <h3 id="statKlaster" class="text-2xl font-black">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-4">
                <div class="card-custom p-6 bg-white dark:bg-slate-900 sticky top-0 shadow-xl">
                    <form id="formArsip" class="space-y-4">
                        <div class="bg-emerald-50 dark:bg-emerald-950/40 p-4 rounded-xl text-center border border-emerald-100 dark:border-emerald-900">
                            <p class="text-[9px] font-black uppercase text-emerald-600 mb-1">Preview Nomor:</p>
                            <h4 id="displayNomor" class="font-mono font-bold text-[11px] break-all">---</h4>
                        </div>

                        <div id="arsipOnly" class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <select id="selKlaster" class="input-modern" onchange="updateSub()"></select>
                                <select id="selSub" class="input-modern" onchange="generatePreview()"></select>
                            </div>
                        </div>

                        <select id="selJenisSurat" class="input-modern" onchange="generatePreview()">
                            <option value="">-- Pilih Jenis Dokumen --</option>
                            <option value="SK">📄 SURAT KEPUTUSAN (SK)</option>
                            <option value="SOP">📋 PROSEDUR (SOP)</option>
                            <option value="ST">📝 SURAT TUGAS (ST)</option>
                            <option value="UND">✉️ UNDANGAN (UND)</option>
                            <option value="MOU">🤝 BERITA ACARA (MOU)</option>
                            <option value="LR">📊 LAPORAN (LR)</option>
                            <option value="DL">📂 DOKUMEN LAINNYA (DL)</option>
                            <option value="PERMANEN">🏛️ PERMANEN</option>
                        </select>

                        <div id="regOnly" class="hidden space-y-4">
                            <input type="text" id="inpAsal" class="input-modern" placeholder="Asal Surat (Pengirim)">
                            <input type="text" id="inpTujuan" class="input-modern" placeholder="Tujuan Surat">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="noUrut" class="input-modern" placeholder="No Urut" oninput="generatePreview()">
                            <input type="date" id="arsipTgl" class="input-modern" onchange="generatePreview()">
                        </div>

                        <textarea id="arsipNama" class="input-modern h-16" placeholder="PERIHAL / NAMA DOKUMEN" required></textarea>
                        
                        <input type="file" id="arsipFile" class="hidden" accept=".pdf">
                        <label for="arsipFile" id="labelFile" class="w-full border-2 border-dashed p-4 rounded-xl flex flex-col items-center cursor-pointer hover:bg-emerald-50 dark:hover:bg-slate-800 transition">
                            <i class="fas fa-cloud-arrow-up text-xl text-emerald-500 mb-1"></i>
                            <span class="text-[10px] font-bold uppercase">Upload PDF (Max 5MB)</span>
                        </label>

                        <button type="submit" id="btnSimpan" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-emerald-700 uppercase">Simpan Data</button>
                        <button type="button" id="btnBatal" onclick="resetForm()" class="hidden w-full text-[10px] font-black text-rose-500 uppercase">Batal Edit</button>
                    </form>
                </div>
            </div>

            <div class="xl:col-span-8">
                <div class="card-custom p-4 mb-6 bg-white dark:bg-slate-900 flex gap-4">
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="Cari nomor atau perihal..." class="input-modern flex-1">
                </div>
                <div class="card-custom overflow-hidden bg-white dark:bg-slate-900 shadow-xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead class="bg-slate-50 dark:bg-slate-800 uppercase font-black text-slate-500 text-[9px]">
                                <tr id="tableHead"></tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y dark:divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modalPreview" class="fixed inset-0 bg-black/90 z-[10000] hidden flex flex-col p-4 backdrop-blur-md">
    <div class="flex justify-between items-center mb-4 text-white">
        <h3 id="previewTitle" class="font-bold text-xs truncate uppercase tracking-widest">Preview Dokumen</h3>
        <button onclick="closePreview()" class="w-10 h-10 bg-rose-600 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-times"></i></button>
    </div>
    <iframe id="previewFrame" class="w-full flex-1 bg-white rounded-2xl"></iframe>
</div>

<div id="modalPedoman" class="fixed inset-0 bg-black/80 z-[9999] hidden flex items-center justify-center p-4 backdrop-blur-md">
    <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] max-w-4xl w-full max-h-[85vh] overflow-hidden flex flex-col">
        <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center bg-emerald-600 text-white">
            <h2 class="text-lg font-black uppercase italic">Pedoman Kode Klasifikasi</h2>
            <button onclick="togglePedoman()" class="w-10 h-10 rounded-full bg-white/20"><i class="fas fa-times"></i></button>
        </div>
        <div id="pedomanContent" class="p-8 overflow-y-auto custom-scrollbar grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwP963edxjXReJ8ghk4wQHvwqmhOQI5pS2BIM5kucAklF84wGDTZ_RKm9ADs1YWGrPz/exec";
    const PIN_HASH = "MjAyNg==";
    let database = JSON.parse(localStorage.getItem('db_arsip_kpds')) || [];
    let currentMode = 'arsip';
    let editIndex = null;
    let fileData = null;

    const KLASTER = {
        "Klaster 1: Manajemen": ["440.11 (RUK)", "440.12 (RPK)", "800 (Kepegawaian)", "900 (Keuangan)"],
        "Klaster 2: Ibu & Anak": ["441.11 (ANC)", "441.21 (Imunisasi)", "441.22 (Stunting)"],
        "Klaster 3: Dewasa & Lansia": ["440.51 (PTM)", "440.53 (Jiwa)", "441.61 (Lansia)"],
        "Klaster 4: P2P & Kesling": ["443.11 (TB)", "443.21 (DBD)", "448.1 (STBM)"],
        "Lintas Klaster": ["442.1 (Farmasi)", "445.1 (Laboratorium)", "440.61 (Promkes)"]
    };

    const CLUSTER_STYLES = {
        "Klaster 1: Manajemen": { icon: "fa-shield-halved", color: "text-blue-600", bg: "bg-blue-50" },
        "Klaster 2: Ibu & Anak": { icon: "fa-baby-carriage", color: "text-rose-600", bg: "bg-rose-50" },
        "Klaster 3: Dewasa & Lansia": { icon: "fa-person-cane", color: "text-amber-600", bg: "bg-amber-50" },
        "Klaster 4: P2P & Kesling": { icon: "fa-virus-slash", color: "text-emerald-600", bg: "bg-emerald-50" },
        "Lintas Klaster": { icon: "fa-layer-group", color: "text-indigo-600", bg: "bg-indigo-50" }
    };

    function verifikasiPin() {
        const pin = document.getElementById('pinInput').value;
        if (btoa(pin) === PIN_HASH) {
            sessionStorage.setItem('arsip_session_pin', pin);
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initApp();
        } else { alert("PIN SALAH!"); }
    }

    function initApp() {
        const kSel = document.getElementById('selKlaster');
        kSel.innerHTML = Object.keys(KLASTER).map(k => `<option value="${k}">${k}</option>`).join('');
        updateSub();
        syncFromGAS();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
    }

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('pageTitle').innerText = mode === 'arsip' ? 'Arsip Digital (SK/SOP)' : mode.toUpperCase();
        
        document.getElementById('arsipOnly').classList.toggle('hidden', mode !== 'arsip');
        document.getElementById('regOnly').classList.toggle('hidden', mode === 'arsip' || mode === 'agenda');
        
        resetForm();
        renderTable();
    }

    function updateSub() {
        const k = document.getElementById('selKlaster').value;
        document.getElementById('selSub').innerHTML = KLASTER[k].map(s => `<option value="${s}">${s}</option>`).join('');
        generatePreview();
    }

    function generatePreview() {
        const jenis = document.getElementById('selJenisSurat').value || "DOC";
        const s = document.getElementById('selSub').value;
        const kode = s ? s.split(' ')[0] : "000";
        const no = (document.getElementById('noUrut').value || "0").padStart(3, '0');
        const tglVal = document.getElementById('arsipTgl').value;
        const d = tglVal ? new Date(tglVal) : new Date();
        const romawi = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"][d.getMonth()];
        const thn = d.getFullYear();

        let nomor = "";
        if(currentMode === 'arsip') nomor = `${kode}/${no}/${jenis}/PKM-KPDS/${romawi}/${thn}`;
        else if(currentMode === 'masuk') nomor = `REG-IN/${no}/PKM-KPDS/${romawi}/${thn}`;
        else nomor = `${kode}/${no}/${jenis}/PKM-KPDS/${romawi}/${thn}`;

        document.getElementById('displayNomor').innerText = nomor;
        return nomor;
    }

    document.getElementById('arsipFile').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('labelFile').innerText = "📂 " + file.name;
        const reader = new FileReader();
        reader.onload = (ev) => fileData = { base64: ev.target.result.split(',')[1], name: file.name, type: file.type };
        reader.readAsDataURL(file);
    };

    document.getElementById('formArsip').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
        
        const payload = {
            token: sessionStorage.getItem('arsip_session_pin'),
            action: editIndex !== null ? "update" : "upload",
            mode: currentMode,
            no: generatePreview(),
            nama: document.getElementById('arsipNama').value.toUpperCase(),
            klaster: document.getElementById('selKlaster').value,
            sub: document.getElementById('selSub').value,
            jenisSurat: document.getElementById('selJenisSurat').value,
            tgl: document.getElementById('arsipTgl').value,
            asal: document.getElementById('inpAsal').value,
            tujuan: document.getElementById('inpTujuan').value,
            fileData: fileData ? fileData.base64 : null
        };

        try {
            const resp = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            const res = await resp.json();
            if (res.status === "success") { alert("Sukses!"); resetForm(); syncFromGAS(); }
        } catch (err) { alert("Error Koneksi!"); } 
        finally { btn.disabled = false; btn.innerText = "Simpan Data"; }
    };

    async function syncFromGAS() {
        document.getElementById('syncIcon').classList.add('fa-spin');
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            database = data.database || [];
            localStorage.setItem('db_arsip_kpds', JSON.stringify(database));
            renderTable();
        } catch(e) { console.error(e); }
        finally { document.getElementById('syncIcon').classList.remove('fa-spin'); }
    }

    function renderTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = database.filter(x => (x.mode || 'arsip') === currentMode && (x.no.toLowerCase().includes(q) || x.nama.toLowerCase().includes(q)));
        
        document.getElementById('statTotal').innerText = database.length;
        document.getElementById('statSK').innerText = database.filter(x => x.jenis === 'SK').length;
        document.getElementById('statSOP').innerText = database.filter(x => x.jenis === 'SOP').length;
        
        const docLain = database.filter(x => x.jenis !== 'SK' && x.jenis !== 'SOP').length;
        document.getElementById('statLain').innerText = docLain;
        document.getElementById('statKlaster').innerText = [...new Set(database.map(x => x.klaster))].length;
   
        // Table Header
        let head = `<th class="p-4">Dokumen</th><th class="p-4 text-center">Jenis</th><th class="p-4 text-center">Aksi</th>`;
        document.getElementById('tableHead').innerHTML = head;

        // Table Body
        document.getElementById('tableBody').innerHTML = filtered.map((x, i) => {
            const thnArsip = new Date(x.tgl).getFullYear();
            const umur = new Date().getFullYear() - thnArsip;
            const retensi = x.jenis === "PERMANEN" ? "PERMANEN" : `USIA: ${umur} THN`;

            return `
            <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                <td class="p-4">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-mono text-emerald-600 font-black text-[10px]">${x.no}</span>
                        <span class="text-[7px] px-1.5 py-0.5 bg-slate-100 dark:bg-slate-700 rounded text-slate-400 font-bold">${retensi}</span>
                    </div>
                    <div class="font-bold uppercase text-slate-700 dark:text-slate-200 leading-tight">${x.nama}</div>
                    <div class="text-[9px] text-slate-400 font-bold uppercase mt-1">
                        <i class="far fa-calendar-alt mr-1"></i>${x.tgl} ${x.asal ? '| Dari: '+x.asal : ''} ${x.tujuan ? '| Ke: '+x.tujuan : ''}
                    </div>
                </td>
                <td class="p-4 text-center">
                    <span class="px-2 py-1 rounded-full text-[8px] font-black bg-slate-100 dark:bg-slate-800">${x.jenis || 'DOC'}</span>
                </td>
                <td class="p-4 flex justify-center gap-2">
                    <button onclick="cetakBarcode(${database.indexOf(x)})" class="btn-action bg-slate-100 hover:bg-emerald-500 hover:text-white"><i class="fas fa-qrcode"></i></button>
                    <button onclick="editData(${database.indexOf(x)})" class="btn-action bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white"><i class="fas fa-pen"></i></button>
                    <button onclick="openPreview('${x.link}')" class="btn-action bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white"><i class="fas fa-eye"></i></button>
                    <button onclick="hapus('${x.no}')" class="btn-action bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`}).join('');
    }

    function cetakBarcode(i) {
        const data = database[i];
        const win = window.open('', '_blank', 'width=400,height=500');
        win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>body{text-align:center;padding:20px;font-family:sans-serif}.box{border:3px solid #000;padding:20px;border-radius:15px;display:inline-block;width:250px}#qr{margin:20px auto;display:flex;justify-content:center}.no{font-weight:900;font-size:14px;border-bottom:2px solid #000;padding-bottom:10px}</style></head><body><div class="box"><div class="no">${data.no}</div><div id="qr"></div><div class="nama" style="font-size:10px;font-weight:bold;text-transform:uppercase">${data.nama}</div></div><script>new QRCode(document.getElementById("qr"),{text:"${data.link}",width:150,height:150});setTimeout(()=>window.print(),500)<\/script></body></html>`);
    }

    function editData(i) {
        editIndex = i;
        const d = database[i];
        document.getElementById('selJenisSurat').value = d.jenis || "";
        document.getElementById('selKlaster').value = d.klaster;
        updateSub();
        document.getElementById('selSub').value = d.sub;
        document.getElementById('arsipNama').value = d.nama;
        document.getElementById('arsipTgl').value = d.tgl;
        document.getElementById('inpAsal').value = d.asal || "";
        document.getElementById('inpTujuan').value = d.tujuan || "";
        document.getElementById('btnSimpan').innerText = "UPDATE DATA";
        document.getElementById('btnBatal').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        editIndex = null;
        document.getElementById('formArsip').reset();
        document.getElementById('btnSimpan').innerText = "SIMPAN DATA";
        document.getElementById('btnBatal').classList.add('hidden');
        document.getElementById('labelFile').innerText = "UPLOAD PDF (MAX 5MB)";
        fileData = null;
    }

    async function hapus(no) {
        const pin = prompt(`Hapus data ${no}?\nMasukkan PIN:`);
        if (btoa(pin) === PIN_HASH) {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "delete", no: no, token: pin }) });
            syncFromGAS();
        } else if(pin) { alert("PIN SALAH!"); }
    }

    function togglePedoman() {
        const m = document.getElementById('modalPedoman');
        if(m.classList.contains('hidden')) {
            let h = `<div class="col-span-full mb-4 bg-emerald-50 p-4 rounded-xl text-[11px]"><b>Panduan:</b> Pilih Klaster untuk kode klasifikasi otomatis. Data tersimpan di Cloud & Google Drive.</div>`;
            Object.keys(KLASTER).forEach(k => {
                const s = CLUSTER_STYLES[k];
                h += `<div class="p-4 ${s.bg} rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3 mb-2 font-black text-[10px] ${s.color}"><i class="fas ${s.icon}"></i> ${k}</div>
                    <div class="flex flex-wrap gap-1">${KLASTER[k].map(c => `<span class="kode-tag">${c}</span>`).join('')}</div>
                </div>`;
            });
            document.getElementById('pedomanContent').innerHTML = h;
            m.classList.remove('hidden');
        } else { m.classList.add('hidden'); }
    }

    function openPreview(link) {
        if(!link || link === 'undefined') return alert("File tidak ditemukan!");
        document.getElementById('previewFrame').src = link.replace('/view', '/preview');
        document.getElementById('modalPreview').classList.remove('hidden');
    }

    function closePreview() { document.getElementById('modalPreview').classList.add('hidden'); document.getElementById('previewFrame').src = ""; }
    function toggleTheme() { 
        document.documentElement.classList.toggle('dark');
        document.getElementById('themeIcon').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon';
    }
    function logout() { sessionStorage.clear(); location.reload(); }
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(database.filter(x => (x.mode || 'arsip') === currentMode));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, `Export_${currentMode}.xlsx`);
    }

    window.onload = () => {
        if(sessionStorage.getItem('arsip_session_pin')) {
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initApp();
        }
    };
</script>
</body>
</html>
